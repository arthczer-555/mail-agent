[build]
  command   = "npm run build"
  publish   = "dist"

[functions]
  directory      = "netlify/functions"
  node_bundler   = "esbuild"

# ── Scheduled Function — toutes les heures ──
[functions."poll-emails"]
  schedule = "0 * * * *"

# ── Timeout explicite pour les actions email (Claude API) ──
[functions."email-action"]
  timeout = 26

# ── Redirections API → Netlify Functions ──
[[redirects]]
  from   = "/api/manual-poll"
  to     = "/.netlify/functions/manual-poll"
  status = 200

[[redirects]]
  from   = "/api/redraft"
  to     = "/.netlify/functions/email-redraft-background"
  status = 200

[[redirects]]
  from   = "/api/emails"
  to     = "/.netlify/functions/get-emails"
  status = 200

[[redirects]]
  from   = "/api/attachment"
  to     = "/.netlify/functions/attachment-proxy"
  status = 200

[[redirects]]
  from   = "/api/sync-read"
  to     = "/.netlify/functions/sync-read"
  status = 200

[[redirects]]
  from   = "/api/bulk-action"
  to     = "/.netlify/functions/bulk-action"
  status = 200

[[redirects]]
  from   = "/api/emails/*"
  to     = "/.netlify/functions/email-action"
  status = 200

[[redirects]]
  from   = "/api/guide"
  to     = "/.netlify/functions/upload-guide"
  status = 200

[[redirects]]
  from   = "/api/examples"
  to     = "/.netlify/functions/manage-examples"
  status = 200

[[redirects]]
  from   = "/api/rules"
  to     = "/.netlify/functions/manage-rules"
  status = 200

# ── SPA fallback (React Router) ──
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[build.environment]
  NODE_VERSION = "20"
  SECRETS_SCAN_OMIT_PATHS = "guide-reponse-email-coachello.txt"
